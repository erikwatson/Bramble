<!DOCTYPE html>
<html>
  <head>
    <title>Tests</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato&display=swap"
      rel="stylesheet"
    />
    <style>
      ul {
        display: flex;
        list-style-type: none;
        padding: 1rem 0 0 1rem;
      }

      ul li {
        color: white;
        margin-right: 0.56rem;
      }

      a {
        display: block;
        text-decoration: none;
        color: black;
        padding: 1rem;
        border-radius: 0.56rem;
        background-color: white;
      }

      a:hover {
        background-color: powderblue;
      }

      #bramble-container {
        height: 500px;
        width: 500px;
      }

      body {
        background-color: black;
      }
    </style>
  </head>

  <body>
    <div id="bramble-container"></div>

    <script type="text/javascript" src="./bramble.js"></script>
    <script type="text/javascript">
      ;(async () => {
        const game = Bramble.game.create()
        const container = document.getElementById('bramble-container')

        game.attachTo(container)
        game.setSize(500, 500)

        let r = 1

        let offset = 0

        game.setUpdate(({ dt, input, sfx, assets }) => {
          r += 1 * dt
          offset += input.mouse.wheel.delta
        })

        game.setRender(({ gfx }) => {
          gfx.clear('white')

          gfx.shadow(() => {
            for (let i = 0; i < 10; i++) {
              gfx.rotation(() => {
                gfx.blur(() => {
                  gfx.colourShift(
                    () => {
                      gfx.circle({ x: 250 + i * 50, y: offset + 50 + i * 50 }, 25, {
                        fill: { colour: 'red' },
                        line: { width: 0 }
                      })
                    },
                    {
                      saturate: 1,
                      hue: i * 25
                    }
                  )
                }, 10 * i)
              }, i * r)
            }
          })
        })

        game.start()
      })()
    </script>
  </body>
</html>
